function getToday() { return new Date().toISOString().split("T")[0]; }
function skey(date, day) { return "trk:" + date + "_" + day; }
function getDayOfWeek(dateStr) { return new Date(dateStr + "T12:00:00").getDay(); }

function lsGet(key) { try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(_) { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch(_) { return false; } }
function lsDel(key) { try { localStorage.removeItem(key); } catch(_) {} }
function lsList(prefix) { const keys = []; try { for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith(prefix)) keys.push(k); } } catch(_) {} return keys; }

function getTodaySchedule(dateStr) {
  const dow = getDayOfWeek(dateStr || getToday());
  return SCHEDULE[dow];
}

function bodyKey(date) { return "body:" + date; }
function loadAllBody() {
  const keys = lsList("body:");
  const entries = [];
  keys.forEach(k => {
    const data = lsGet(k);
    if (data) entries.push({ date: k.replace("body:", ""), ...data });
  });
  return entries.sort((a, b) => a.date.localeCompare(b.date));
}

function formatDate(d) {
  const parts = d.split("-");
  return parts[2] + "/" + parts[1];
}

/* ═══════════ MINI SPARKLINE CHART ═══════════ */

function Sparkline({ data, color, width = 200, height = 50 }) {
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d.v).filter(v => v !== null && v !== undefined);
  if (vals.length < 2) return null;
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pad = 4;
  const w = width;
  const h = height;
  const points = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return x + "," + y;
  });
  const first = vals[0];
  const last = vals[vals.length - 1];
  const diff = last - first;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <svg width={w} height={h} style={{ display: "block" }}>
        <polyline points={points.join(" ")} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        {vals.map((v, i) => {
          const x = pad + (i / (vals.length - 1)) * (w - pad * 2);
          const y = h - pad - ((v - min) / range) * (h - pad * 2);
          return <circle key={i} cx={x} cy={y} r={i === vals.length - 1 ? 4 : 2.5} fill={i === vals.length - 1 ? color : "#333"} stroke={i === vals.length - 1 ? color : "none"} strokeWidth="1" />;
        })}
      </svg>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontFamily: heading, fontSize: 24, color: color, lineHeight: 1 }}>{last}</div>
        {diff !== 0 && (
          <div style={{ fontFamily: mono, fontSize: 10, color: diff < 0 ? "#c8f135" : diff > 0 ? "#ff6b6b" : "#555", marginTop: 2 }}>
            {diff > 0 ? "+" : ""}{diff.toFixed(1)}
          </div>
        )}
      </div>
    </div>
  );
}

        const clean = {};

        if (Object.keys(clean).length > 0) {
          lsSet(bodyKey(bodyDate), clean);
        } else {
          lsDel(bodyKey(bodyDate));
        }
        setBodyHistory(loadAllBody());
      }, 600);
      return next;
    });

  const loadHistory = useCallback(() => {
    const cur = skey(sessionDate, activeDay);
    const allKeys = lsList("trk:");
    const dayKeys = allKeys.filter(k => k.endsWith("_" + activeDay) && k !== cur);
    const entries = dayKeys.map(k => {
      const data = lsGet(k);
      const date = k.replace("trk:", "").replace("_" + activeDay, "");
      return { date, exMap: data || {} };
    });
    setHistory(entries.sort((a, b) => b.date.localeCompare(a.date)));
  }, [activeDay, sessionDate]);

  useEffect(() => { loadHistory(); }, [loadHistory]);

  const persist = useCallback((data, day, date) => {
    const d  = day  !== undefined ? day  : activeDayRef.current;
    const dt = date !== undefined ? date : sessionDateRef.current;
    setSaveState("saving");
    const ok = lsSet(skey(dt, d), data);
    setSaveState(ok ? "saved" : "error");
  }, []);

  const updateSet = useCallback((exId, setIdx, field, value) => {
    setSessionData(prev => {
      const arr = prev[exId] ? [...prev[exId]] : [];
      while (arr.length <= setIdx) arr.push({ weight: "", reps: "", note: "" });
      arr[setIdx] = { ...arr[setIdx], [field]: value };
      const next = { ...prev, [exId]: arr };
      persist(next);
      return next;
    });
  }, [persist]);

  const switchDay = useCallback((newDay) => {
    if (newDay === activeDayRef.current) return;
    persist(sessionDataRef.current, activeDayRef.current, sessionDateRef.current);
    setActiveDay(newDay);
    setWarmupOpen(false);
  }, [persist]);

  const clearSession = () => {
    lsDel(skey(sessionDate, activeDay));
    setSessionData({});
    showToast("Session cleared");
  };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const timerEndTime = useRef(null);

  const tickTimer = useCallback(() => {
    if (!timerEndTime.current) return;
    const remaining = Math.max(0, Math.round((timerEndTime.current - Date.now()) / 1000));
    setTimer(prev => {
      if (!prev) return null;
      if (remaining <= 0 && prev.remaining > 0) {
        try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch(_) {}
      }
      return { ...prev, remaining };
    });
    if (remaining <= 0) {
      clearInterval(timerInterval.current);
    }
  }, []);

  const startTimer = useCallback((exType) => {
    if (timerInterval.current) clearInterval(timerInterval.current);
    const total = REST_SECONDS[exType] || 90;
    timerEndTime.current = Date.now() + total * 1000;
    setTimer({ exType, total, remaining: total });
    timerInterval.current = setInterval(tickTimer, 1000);
  }, [tickTimer]);

  const dismissTimer = useCallback(() => {
    if (timerInterval.current) clearInterval(timerInterval.current);
    timerEndTime.current = null;
    setTimer(null);
  }, []);

  /* Resume timer correctly when app returns to foreground */
  useEffect(() => {
    const onVisibility = () => {
      if (!document.hidden && timerEndTime.current) {
        tickTimer();
      }
    };
    document.addEventListener("visibilitychange", onVisibility);
    return () => document.removeEventListener("visibilitychange", onVisibility);
  }, [tickTimer]);

  const exportData = () => {
    const allKeys = [...lsList("trk:"), ...lsList("body:")];
    const dump = {};
    allKeys.forEach(k => { const v = lsGet(k); if (v) dump[k] = v; });
    if (Object.keys(dump).length === 0) { showToast("Nothing to export"); return; }
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "4split-" + getToday() + ".json"; a.click();
    URL.revokeObjectURL(url);
    showToast("Exported " + allKeys.length + " entries");
  };

  const importData = () => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          let count = 0;
          Object.entries(data).forEach(([k, v]) => {
            if ((k.startsWith("trk:") || k.startsWith("body:")) && typeof v === "object") { lsSet(k, v); count++; }

          loadHistory();
          setSessionData(lsGet(skey(sessionDate, activeDay)) || {});
          setBodyHistory(loadAllBody());
          showToast("Imported " + count + " entries");
        } catch(_) { showToast("Invalid file"); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

      {/* ═══════════════════ OVERVIEW TAB ═══════════════════ */}
      {mainTab === "overview" && (

            <div style={{ fontFamily: heading, fontSize: 52, lineHeight: 0.88, letterSpacing: 2 }}>

            </div>

            {/* Macros */}
            <div style={{ marginBottom: 12 }}>

            <div style={{ marginBottom: 12 }}>

        </div>

      {/* ═══════════════════ NUTRITION TAB ═══════════════════ */}
      {mainTab === "nutrition" && (

            <div style={{ fontFamily: heading, fontSize: 52, lineHeight: 0.88, letterSpacing: 2 }}>

            {/* Extra activity note */}
            {mealDayType === "train" && (
              <div style={{ ...card, padding: "12px 16px", marginBottom: 12, borderLeft: "3px solid #6bc5ff" }}>
                <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: 2, color: "#6bc5ff", marginBottom: 4 }}>EXTRA ACTIVITY? (PADEL, WALK, ETC.)</div>

                <div style={{ ...card, padding: "16px 18px", marginBottom: 12 }}>

                  <div style={{ fontSize: 13, color: "#888", lineHeight: 1.6 }}>

                {[

                  { bad: "All rice-heavy sushi rolls", good: "Sashimi + edamame + 1-2 rolls" },
                  { bad: "Doner with fries + sauces", good: "Doner plate with salad, light sauce" },
                ].map((r, i) => (
                  <div key={i} style={{ ...card, padding: "10px 16px", marginBottom: 6 }}>
                    <div style={{ fontSize: 11, color: "#555", textDecoration: "line-through", marginBottom: 3 }}>{r.bad}</div>
                    <div style={{ fontSize: 12, color: "#aacf3f" }}>{r.good}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Protein shake tip */}
            {mealDayType !== "out" && (
              <div style={{ ...card, padding: "14px 16px", marginTop: 12, borderLeft: "3px solid #c8f135" }}>
                <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: 2, color: "#c8f135", marginBottom: 4 }}>PROTEIN SHAKE SHORTCUT</div>
                <div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>
                  1 scoop whey = ~25g protein, ~120 cal. Use cow milk (+8g P), not oat milk (1g P). 1-2 shakes/day locks in 25-50g protein so meals can be simpler.
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ═══════════════════ WORKOUT TAB ═══════════════════ */}
      {mainTab === "workout" && (
        <div>
          <div style={{ padding: "40px 24px 20px", borderBottom: "1px solid #181818" }}>
            <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 4, color: "#c8f135", marginBottom: 8 }}>// 4SPLIT</div>
            <div style={{ fontFamily: heading, fontSize: 52, lineHeight: 0.88, letterSpacing: 2, marginBottom: 16 }}>
              WORK<br /><span style={{ color: "#c8f135" }}>OUT</span>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              <input type="date" value={sessionDate} onChange={e => setSessionDate(e.target.value)} style={{ width: 155 }} />
              <div style={{ display: "flex", background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, overflow: "hidden" }}>
                {["log","history"].map(v => (
                  <button key={v} onClick={() => setWorkoutView(v)} style={{ padding: "8px 16px", fontFamily: mono, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", background: workoutView === v ? "#222" : "transparent", color: workoutView === v ? "#f0f0f0" : "#444" }}>
                    {v}

              </div>
              <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: 1, color: saveState === "error" ? "#ff6b6b" : saveState === "saved" ? "#c8f135" : saveState === "saving" ? "#888" : "#2a2a2a", animation: saveState === "saving" ? "blink 0.8s infinite" : "none" }}>
                {saveState === "error" ? "* fail" : saveState === "saved" ? "* saved" : saveState === "saving" ? "* saving" : "* ready"}
              </span>

          {/* Day tabs */}
          <div style={{ display: "flex", gap: 10, padding: "18px 24px 0", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>

                {w.label} <span style={{ fontWeight: 300, opacity: 0.65, fontSize: 11, marginLeft: 4 }}>* {w.day}</span>

          </div>

          {/* Session bar */}
          <div style={{ padding: "14px 24px 0" }}>

          {workoutView === "log" && (
            <div style={{ padding: "14px 24px 0", display: "flex", flexDirection: "column", gap: 12 }}>

                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <span style={{ fontFamily: mono, fontSize: 16, color: workout.theme }}>&#9775;</span>
                      <div>

              {(() => {
                const exercises = workout.exercises;

                while (i < exercises.length) {

                  const ssGroup = getSupersetGroup(activeDay, ex.id);

                  if (ssGroup >= 0) {
                    const ssColor = SUPERSET_COLORS[ssGroup % SUPERSET_COLORS.length];
                    const group = SUPERSETS[activeDay][ssGroup];
                    const groupExercises = group.map(id => exercises.find(e => e.id === id)).filter(Boolean);

                    if (ex.id === group[0]) {
                      const ssLabel = group.length >= 3 ? "TRI-SET" : "SUPERSET";
                      const ssNote = group.length >= 3 ? "No rest between all three. Rest after completing all." : "No rest between these two. Rest after completing both.";
                      rendered.push(
                        <div key={"ss-" + ssGroup} style={{ border: "1px solid " + ssColor.border, borderRadius: 14, background: ssColor.bg, padding: "2px" }}>

                          })}
                        </div>
                      );
                      i += group.length;
                      continue;
                    }
                  }

                  rendered.push(renderExercise(ex, i, 0));
                  i++;
                }
                return rendered;
              })()}

              {/* Progress bar */}
              {(() => {
                const logged = workout.exercises.reduce((n, ex) => n + (sessionData[ex.id] || []).filter(s => s.weight || s.reps).length, 0);

                const pct    = Math.min(100, Math.round((logged / total) * 100));
                return (
                  <div style={{ ...card, padding: "16px 20px", display: "flex", gap: 16, alignItems: "center" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: mono, fontSize: 8, color: "#555", letterSpacing: 2, marginBottom: 6 }}>SESSION PROGRESS</div>
                      <div style={{ height: 4, background: "#1a1a1a", borderRadius: 2 }}>
                        <div style={{ height: "100%", width: pct + "%", background: workout.theme, borderRadius: 2, transition: "width 0.4s ease" }} />
                      </div>
                    </div>
                    <div style={{ fontFamily: heading, fontSize: 36, color: workout.theme, lineHeight: 1 }}>
                      {logged}<span style={{ color: "#555", fontSize: 20 }}>/{total}</span>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* History view */}
          {workoutView === "history" && (
            <div style={{ padding: "18px 24px 0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ fontFamily: heading, fontSize: 26, color: workout.theme, letterSpacing: 1 }}>
                  {workout.label} * Past Sessions
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={exportData} style={{ background: "#111", border: "1px solid #252525", color: "#888", borderRadius: 6, padding: "6px 12px", fontFamily: mono, fontSize: 10, letterSpacing: 1 }}>EXPORT</button>
                  <button onClick={importData} style={{ background: "#111", border: "1px solid #252525", color: "#888", borderRadius: 6, padding: "6px 12px", fontFamily: mono, fontSize: 10, letterSpacing: 1 }}>IMPORT</button>
                </div>
              </div>
              {history.length === 0 ? (
                <div style={{ ...card, padding: 40, textAlign: "center", fontFamily: mono, fontSize: 12, color: "#555" }}>
                  No past sessions yet.
                </div>
              ) : history.map(({ date, exMap }) => {
                const filled = workout.exercises.filter(ex => exMap[ex.id]?.some(s => s.weight || s.reps));
                if (!filled.length) return null;
                return (
                  <div key={date} style={{ ...card, marginBottom: 12 }}>
                    <div style={{ padding: "12px 18px", borderBottom: "1px solid #161616", background: "#0d0d0d", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontFamily: mono, fontSize: 13, color: workout.theme }}>{date}</span>
                      <span style={{ fontFamily: mono, fontSize: 10, color: "#555" }}>{filled.length} ex</span>
                    </div>
                    <div style={{ padding: "12px 18px" }}>
                      {filled.map(ex => {
                        const sets = (exMap[ex.id] || []).filter(s => s.weight || s.reps);
                        return (
                          <div key={ex.id} style={{ marginBottom: 10 }}>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#bbb", marginBottom: 5 }}>{ex.name}</div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                              {sets.map((s, i) => (
                                <span key={i} style={{ background: "#181818", border: "1px solid #202020", borderRadius: 6, padding: "4px 10px", fontFamily: mono, fontSize: 11, color: "#777" }}>
                                  {s.weight ? s.weight + "kg" : "--"} x {s.reps || "--"}
                                </span>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ═══════════════════ BODY TAB ═══════════════════ */}
      {mainTab === "body" && (
        <div>
          <div style={{ padding: "40px 24px 20px", borderBottom: "1px solid #181818" }}>
            <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 4, color: "#c8f135", marginBottom: 8 }}>// 4SPLIT</div>
            <div style={{ fontFamily: heading, fontSize: 52, lineHeight: 0.88, letterSpacing: 2 }}>
              BODY<br /><span style={{ color: "#c8f135" }}>TRACK</span>
            </div>
          </div>

          <div style={{ ...sectionPad }}>
            {/* Date picker */}
            <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
              <input type="date" value={bodyDate} onChange={e => setBodyDate(e.target.value)} style={{ width: 155 }} />
              <span style={{ fontFamily: mono, fontSize: 10, color: "#555" }}>
                {bodyHistory.length} entries logged
              </span>
            </div>

            {/* Input fields */}
            <div style={{ ...card, padding: "16px 18px", marginBottom: 16 }}>
              <div style={{ ...labelStyle, marginBottom: 12 }}>LOG MEASUREMENTS</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {BODY_FIELDS.map(f => (
                  <div key={f.key}>
                    <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: 1, color: "#555", marginBottom: 4 }}>
                      {f.label} <span style={{ color: "#333" }}>({f.unit})</span>
                    </div>
                    <input
                      type="number"
                      step="0.1"
                      placeholder="--"
                      value={bodyData[f.key] || ""}
                      onChange={e => updateBody(f.key, e.target.value)}
                      style={{ fontSize: 15, padding: "10px 12px" }}
                    />
                  </div>
                ))}
              </div>
              <div style={{ fontFamily: mono, fontSize: 9, color: "#333", marginTop: 10, textAlign: "center" }}>Auto-saves as you type</div>
            </div>

            {/* Progress charts */}
            {bodyHistory.length >= 2 && (
              <div>
                <div style={{ ...labelStyle, marginBottom: 10 }}>PROGRESS</div>

                {/* Metric picker */}
                <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", WebkitOverflowScrolling: "touch", paddingBottom: 4 }}>
                  {BODY_FIELDS.map(f => {
                    const hasData = bodyHistory.some(h => h[f.key]);
                    if (!hasData) return null;
                    return (
                      <button key={f.key} onClick={() => setBodyMetric(f.key)} style={{
                        background: bodyMetric === f.key ? "#c8f135" : "#111",
                        color: bodyMetric === f.key ? "#000" : "#555",
                        border: "1px solid " + (bodyMetric === f.key ? "#c8f135" : "#1e1e1e"),
                        borderRadius: 8, padding: "6px 12px", fontFamily: mono, fontSize: 10, letterSpacing: 1,
                        whiteSpace: "nowrap", flexShrink: 0
                      }}>
                        {f.label}
                      </button>
                    );
                  })}
                </div>

                {/* Chart card */}
                {(() => {
                  const field = BODY_FIELDS.find(f => f.key === bodyMetric);
                  const data = bodyHistory.filter(h => h[bodyMetric]).map(h => ({ date: h.date, v: parseFloat(h[bodyMetric]) }));
                  if (data.length < 2) return (
                    <div style={{ ...card, padding: 30, textAlign: "center", fontFamily: mono, fontSize: 11, color: "#555" }}>
                      Need at least 2 entries to show progress.
                    </div>
                  );
                  const first = data[0];
                  const last = data[data.length - 1];
                  const isDesirable = ["weight", "fatPct", "waist"].includes(bodyMetric);
                  return (
                    <div style={{ ...card, padding: "18px 20px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                        <div>
                          <div style={{ fontFamily: heading, fontSize: 22, color: "#f0f0f0", letterSpacing: 1 }}>{field.label}</div>
                          <div style={{ fontFamily: mono, fontSize: 10, color: "#555" }}>{formatDate(first.date)} to {formatDate(last.date)}</div>
                        </div>
                        <div style={{ fontFamily: mono, fontSize: 10, color: "#555" }}>{field.unit}</div>
                      </div>
                      <Sparkline
                        data={data}
                        color={isDesirable ? (last.v <= first.v ? "#c8f135" : "#ff6b6b") : (last.v >= first.v ? "#c8f135" : "#ff6b6b")}
                        width={280}
                        height={60}
                      />
                      <div style={{ display: "flex", gap: 16, marginTop: 14 }}>
                        <div style={{ flex: 1, background: "#0d0d0d", borderRadius: 8, padding: "8px 12px", textAlign: "center" }}>
                          <div style={{ fontFamily: mono, fontSize: 8, color: "#555", letterSpacing: 1, marginBottom: 2 }}>FIRST</div>
                          <div style={{ fontFamily: mono, fontSize: 14, color: "#777" }}>{first.v}{field.unit}</div>
                        </div>
                        <div style={{ flex: 1, background: "#0d0d0d", borderRadius: 8, padding: "8px 12px", textAlign: "center" }}>
                          <div style={{ fontFamily: mono, fontSize: 8, color: "#555", letterSpacing: 1, marginBottom: 2 }}>LATEST</div>
                          <div style={{ fontFamily: mono, fontSize: 14, color: "#f0f0f0" }}>{last.v}{field.unit}</div>
                        </div>
                        <div style={{ flex: 1, background: "#0d0d0d", borderRadius: 8, padding: "8px 12px", textAlign: "center" }}>
                          <div style={{ fontFamily: mono, fontSize: 8, color: "#555", letterSpacing: 1, marginBottom: 2 }}>CHANGE</div>
                          <div style={{ fontFamily: mono, fontSize: 14, color: (last.v - first.v) === 0 ? "#555" : isDesirable ? (last.v <= first.v ? "#c8f135" : "#ff6b6b") : (last.v >= first.v ? "#c8f135" : "#ff6b6b") }}>
                            {(last.v - first.v) > 0 ? "+" : ""}{(last.v - first.v).toFixed(1)}{field.unit}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* History table */}
                <div style={{ marginTop: 16 }}>
                  <div style={{ ...labelStyle, marginBottom: 8 }}>ALL ENTRIES</div>
                  {[...bodyHistory].reverse().map(entry => {
                    const filled = BODY_FIELDS.filter(f => entry[f.key]);
                    if (!filled.length) return null;
                    return (
                      <div key={entry.date} style={{ ...card, marginBottom: 8, padding: "12px 16px" }}>
                        <div style={{ fontFamily: mono, fontSize: 12, color: "#c8f135", marginBottom: 8 }}>{entry.date}</div>
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          {filled.map(f => (
                            <span key={f.key} style={{ background: "#181818", border: "1px solid #202020", borderRadius: 6, padding: "3px 10px", fontFamily: mono, fontSize: 11, color: "#777" }}>
                              {f.label}: {entry[f.key]}{f.unit}
                            </span>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Export/import */}
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button onClick={exportData} style={{ flex: 1, background: "#111", border: "1px solid #252525", color: "#888", borderRadius: 8, padding: "10px", fontFamily: mono, fontSize: 10, letterSpacing: 1 }}>EXPORT ALL</button>
                  <button onClick={importData} style={{ flex: 1, background: "#111", border: "1px solid #252525", color: "#888", borderRadius: 8, padding: "10px", fontFamily: mono, fontSize: 10, letterSpacing: 1 }}>IMPORT</button>
                </div>
              </div>
            )}

            {bodyHistory.length < 2 && (
              <div style={{ ...card, padding: "30px 20px", textAlign: "center" }}>
                <div style={{ fontFamily: heading, fontSize: 28, color: "#333", marginBottom: 8 }}>START TRACKING</div>
                <div style={{ fontFamily: mono, fontSize: 11, color: "#555", lineHeight: 1.6 }}>
                  Log your measurements above. After 2+ entries you'll see progress charts here. Measure weekly, same time of day (morning, before eating).
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ═══════════════════ REST TIMER MODAL ═══════════════════ */}
      {timer !== null && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 24, padding: "40px 48px", display: "flex", flexDirection: "column", alignItems: "center", gap: 20, minWidth: 260 }}>
            <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 4, color: "#777", textTransform: "uppercase" }}>
              {timer.remaining === 0 ? "Go again!" : "Rest * " + timer.exType}
            </div>
            {(() => {
              const done  = timer.remaining === 0;
              const pct   = timer.remaining / timer.total;
              const r     = 54;
              const circ  = 2 * Math.PI * r;
              const dash  = circ * pct;
              const col   = done ? "#c8f135" : timer.exType === "Compound" ? "#c8f135" : timer.exType === "Isolation" ? "#6bc5ff" : "#ff6b6b";
              const mins  = Math.floor(timer.remaining / 60);
              const secs  = timer.remaining % 60;
              const label = mins > 0 ? mins + ":" + String(secs).padStart(2, "0") : String(secs);
              return (
                <div style={{ position: "relative", width: 130, height: 130 }}>
                  <svg width="130" height="130" style={{ transform: "rotate(-90deg)", display: "block" }}>
                    <circle cx="65" cy="65" r={r} fill="none" stroke="#1a1a1a" strokeWidth="6" />
                    <circle cx="65" cy="65" r={r} fill="none" stroke={col} strokeWidth="6" strokeLinecap="round" strokeDasharray={dash + " " + circ} style={{ transition: "stroke-dasharray 0.95s linear" }} />
                  </svg>
                  <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                    <div style={{ fontFamily: heading, fontSize: done ? 36 : 46, color: done ? "#c8f135" : "#fff", lineHeight: 1, letterSpacing: 1 }}>
                      {done ? "GO" : label}
                    </div>
                    {!done && (
                      <div style={{ fontFamily: mono, fontSize: 9, color: "#666", marginTop: 2 }}>
                        {"/ " + (timer.total >= 60 ? Math.floor(timer.total/60) + ":" + String(timer.total%60).padStart(2,"0") : timer.total + "s")}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}
            <button onClick={dismissTimer} style={{ background: timer.remaining === 0 ? "#c8f135" : "#1a1a1a", color: timer.remaining === 0 ? "#000" : "#666", border: "1px solid " + (timer.remaining === 0 ? "#c8f135" : "#2a2a2a"), borderRadius: 10, padding: "12px 32px", fontFamily: mono, fontSize: 12, letterSpacing: 2, fontWeight: timer.remaining === 0 ? 700 : 400 }}>
              {timer.remaining === 0 ? "START SET" : "SKIP"}
            </button>
          </div>
        </div>
      )}

      {/* ═══════════════════ BOTTOM NAV ═══════════════════ */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0a0a0a", borderTop: "1px solid #1a1a1a", display: "flex", paddingBottom: "env(safe-area-inset-bottom)", zIndex: 100 }}>
        {[
          { key: "overview",  label: "Today",     icon: "O" },
          { key: "nutrition", label: "Nutrition",  icon: "N" },
          { key: "workout",   label: "Workout",    icon: "W" },
          { key: "body",      label: "Body",       icon: "B" },
        ].map(tab => (
          <button key={tab.key} onClick={() => setMainTab(tab.key)} style={{ flex: 1, padding: "10px 0 8px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "transparent", color: mainTab === tab.key ? "#c8f135" : "#333" }}>
            <div style={{ fontFamily: heading, fontSize: 22, lineHeight: 1 }}>{tab.icon}</div>
            <div style={{ fontFamily: mono, fontSize: 8, letterSpacing: 1.5 }}>{tab.label}</div>
          </button>
        ))}
      </div>

    </div>
  );

  /* ═══════ Exercise render helper ═══════ */
  function renderExercise(ex, ei, marginBottom) {
    const tc      = TYPE_COLORS[ex.type];
    const sets    = sessionData[ex.id] || [];
    const prevS   = prevSess?.exMap?.[ex.id] || [];
    const prevW   = prevS.map(s => parseFloat(s.weight)).filter(Boolean);
    const maxPrev = prevW.length ? Math.max(...prevW) : null;
    const currW   = sets.map(s => parseFloat(s.weight)).filter(Boolean);
    const maxCurr = currW.length ? Math.max(...currW) : null;
    const diff    = maxCurr !== null && maxPrev !== null ? +(maxCurr - maxPrev).toFixed(1) : null;

    return (
      <div key={ex.id} style={{ ...card, marginBottom }}>
        <div style={{ padding: "13px 18px", borderBottom: "1px solid #161616", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontFamily: mono, fontSize: 10, color: "#555" }}>{String(ei + 1).padStart(2, "0")}</span>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14, lineHeight: 1.2 }}>{ex.name}</div>
              <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>Target: {ex.sets} x {ex.repsTarget}</div>
            </div>
          </div>
          <span style={{ background: tc.bg, color: tc.color, border: "1px solid " + tc.border, borderRadius: 4, padding: "2px 8px", fontSize: 9, fontFamily: mono, letterSpacing: 1, flexShrink: 0 }}>
            {ex.type}
          </span>
        </div>

        <div style={{ padding: "10px 18px 14px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 1fr 2fr 52px", gap: 6, marginBottom: 4 }}>
            {["SET","KG","REPS","NOTE",""].map((h, i) => (
              <div key={i} style={{ fontFamily: mono, fontSize: 8, color: "#555", letterSpacing: 2 }}>{h}</div>
            ))}
          </div>

          {Array.from({ length: ex.sets }).map((_, si) => {
            const s      = sets[si] || {};
            const filled = s.weight || s.reps;
            const prevSet = prevS[si];
            const prevHint = prevSet && (prevSet.weight || prevSet.reps) ? (prevSet.weight ? prevSet.weight + "kg" : "--") + " x " + (prevSet.reps || "--") : null;
            return (
              <div key={si} style={{ marginBottom: 5 }}>
                <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 1fr 2fr 52px", gap: 6, alignItems: "center" }}>
                  <div style={{ fontFamily: mono, fontSize: 13, color: filled ? workout.theme : "#252525", fontWeight: filled ? 700 : 400 }}>
                    {si + 1}
                  </div>
                  <input type="number" placeholder={prevSet?.weight ? prevSet.weight : "--"} value={s.weight || ""} min="0" step="0.5" onChange={e => updateSet(ex.id, si, "weight", e.target.value)} />
                  <input type="text" placeholder={prevSet?.reps ? prevSet.reps : ex.repsTarget} value={s.reps || ""} onChange={e => updateSet(ex.id, si, "reps", e.target.value)} />
                  <input type="text" placeholder="note" value={s.note || ""} onChange={e => updateSet(ex.id, si, "note", e.target.value)} />
                  <button onClick={() => startTimer(ex.type)} style={{ background: filled ? tc.bg : "#111", border: "1px solid " + (filled ? tc.border : "#1e1e1e"), color: filled ? tc.color : "#2a2a2a", borderRadius: 6, padding: "7px 0", fontFamily: mono, fontSize: 9, letterSpacing: 0.5, width: "100%" }}>
                    REST
                  </button>
                </div>
                {prevHint && (
                  <div style={{ paddingLeft: 30, fontFamily: mono, fontSize: 10, color: "#3a3a3a", marginTop: 2 }}>
                    prev: {prevHint}
                  </div>
                )}
              </div>
            );
          })}

          {maxPrev !== null && (
            <div style={{ marginTop: 8, padding: "6px 10px", background: "#0d0d0d", borderRadius: 6, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontFamily: mono, fontSize: 9, color: "#555", letterSpacing: 1 }}>PREV {prevSess.date}</span>
              <span style={{ fontFamily: mono, fontSize: 11, color: "#777" }}>max {maxPrev}kg</span>
              {diff !== null && (
                <span style={{ fontFamily: mono, fontSize: 11, fontWeight: 700, color: diff > 0 ? "#c8f135" : diff < 0 ? "#ff6b6b" : "#444" }}>
                  {diff > 0 ? "^ +" + diff : diff < 0 ? "v " + diff : "= same"}
                </span>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>

</body>
</html>
